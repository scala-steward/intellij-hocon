# Group IntelliJ test framework updates so Scala Steward opens one PR
# instead of separate PRs that all modify `ThisBuild / intellijBuild`.
pullRequests.grouping = [
  {
    name = "intellij-build"
    title = "Update IntelliJ build dependencies"
    filter = [
      { group = "com.jetbrains.intellij.platform" }
      { group = "com.jetbrains.intellij.java" }
    ]
  }
]
